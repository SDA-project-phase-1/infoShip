<!DOCTYPE html>
<html>

<head>
    <title>mhmm</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --bg-color: #0b0e14;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --accent-cyan: #58a6ff;
            --axis-tick-color: #8b949e;
            --glow-cyan: rgba(88, 166, 255, 0.6);
            --glow-pink: rgba(255, 80, 140, 0.6);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Share Tech Mono', monospace;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ── Animated grid background ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(88,166,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(88,166,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridDrift 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gridDrift {
            0%   { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }

        /* ── Scanline overlay ── */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.08) 2px,
                rgba(0,0,0,0.08) 4px
            );
            pointer-events: none;
            z-index: 999;
            animation: scanPulse 4s ease-in-out infinite;
        }

        @keyframes scanPulse {
            0%, 100% { opacity: 0.4; }
            50%       { opacity: 0.8; }
        }

        /* ── Roaming scan line ── */
        #scan-line {
            position: fixed;
            left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(88,166,255,0.5), transparent);
            box-shadow: 0 0 8px rgba(88,166,255,0.8);
            z-index: 998;
            animation: scanMove 6s linear infinite;
            pointer-events: none;
        }

        @keyframes scanMove {
            0%   { top: -2px; }
            100% { top: 100vh; }
        }

        /* ── Title ── */
        h1 {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: clamp(1.2rem, 3vw, 2rem);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 30px;
            margin-top: 10px;
            position: relative;
            z-index: 1;
            color: #e6edf3;
            text-shadow:
                0 0 10px rgba(88,166,255,0.8),
                0 0 30px rgba(88,166,255,0.4),
                0 0 60px rgba(88,166,255,0.2);
            animation: titlePulse 3s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { text-shadow: 0 0 10px rgba(88,166,255,0.8), 0 0 30px rgba(88,166,255,0.4); }
            50%       { text-shadow: 0 0 20px rgba(88,166,255,1),   0 0 50px rgba(88,166,255,0.7), 0 0 80px rgba(88,166,255,0.3); }
        }

        /* blinking cursor after title */
        h1::after {
            content: '_';
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0; }
        }

        /* ── Dashboard grid ── */
        .dashboard-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            width: 95vw;
            max-width: 1800px;
            position: relative;
            z-index: 1;
        }

        /* ── Chart card ── */
        .chart-container {
            flex: 1;
            position: relative;
            height: 60vh;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            transition: border-color 0.3s;

            /* Animated gradient border glow */
            animation: cardBreath 4s ease-in-out infinite;
        }

        @keyframes cardBreath {
            0%, 100% { box-shadow: 0 0 15px rgba(88,166,255,0.1), 0 10px 30px rgba(0,0,0,0.5); }
            50%       { box-shadow: 0 0 30px rgba(88,166,255,0.3), 0 10px 40px rgba(0,0,0,0.6); }
        }

        .chart-container:hover {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 40px rgba(88,166,255,0.4), 0 10px 40px rgba(0,0,0,0.6);
        }

        /* Corner decorations */
        .chart-container::before,
        .chart-container::after {
            content: '';
            position: absolute;
            width: 14px; height: 14px;
            border-color: var(--accent-cyan);
            border-style: solid;
            z-index: 2;
            opacity: 0.7;
        }

        .chart-container::before {
            top: 6px; left: 6px;
            border-width: 2px 0 0 2px;
        }

        .chart-container::after {
            bottom: 6px; right: 6px;
            border-width: 0 2px 2px 0;
        }

        /* card label badge */
        .card-label {
            position: absolute;
            top: 10px; right: 20px;
            font-family: 'Orbitron', monospace;
            font-size: 0.6rem;
            letter-spacing: 3px;
            color: var(--accent-cyan);
            opacity: 0.6;
            z-index: 3;
        }

        /* ── Telemetry row ── */
        .telemetry-row {
            display: flex;
            gap: 10px;
            width: 95vw;
            max-width: 1800px;
            margin-top: 20px;
            margin-bottom: 50px;
            position: relative;
            z-index: 1;
        }

        .telemetry-box {
            flex: 1;
            background: #1c2128;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .telemetry-box:hover {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(88,166,255,0.2);
        }

        .telemetry-box span {
            display: block;
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--axis-tick-color);
            margin-bottom: 10px;
            font-family: 'Orbitron', monospace;
        }

        .telemetry-box div {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--accent-cyan);
            font-family: 'Orbitron', monospace;
            text-shadow: 0 0 10px rgba(88,166,255,0.6);
            transition: color 0.2s;
        }

        /* glitch flash when value updates */
        @keyframes glitchFlash {
            0%   { transform: translateX(0);   color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.9); }
            20%  { transform: translateX(-3px); color: #ff508c; text-shadow: -2px 0 8px #ff508c; }
            40%  { transform: translateX(3px);  color: #58a6ff; text-shadow: 2px 0 8px #58a6ff; }
            60%  { transform: translateX(-2px); color: #50ffb4; text-shadow: -1px 0 6px #50ffb4; }
            80%  { transform: translateX(1px); }
            100% { transform: translateX(0);   color: var(--accent-cyan); text-shadow: 0 0 10px rgba(88,166,255,0.6); }
        }

        .glitch {
            animation: glitchFlash 0.4s ease forwards;
        }

        /* pulse ring on telemetry box */
        @keyframes pulseRing {
            0%   { box-shadow: inset 0 0 0 0 rgba(88,166,255,0), 0 0 0 0 rgba(88,166,255,0.5); }
            50%  { box-shadow: inset 0 0 0 0 rgba(88,166,255,0), 0 0 0 12px rgba(88,166,255,0); }
            100% { box-shadow: none; }
        }

        .pulse-box {
            animation: pulseRing 0.6s ease-out;
        }

        /* ── Status bar at bottom ── */
        #status-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 28px;
            background: rgba(22,27,34,0.95);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 30px;
            z-index: 1000;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: var(--axis-tick-color);
        }

        #status-bar .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #3fb950;
            box-shadow: 0 0 6px #3fb950;
            animation: dotBlink 2s ease-in-out infinite;
            display: inline-block;
            margin-right: 6px;
        }

        @keyframes dotBlink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }

        #packet-count { color: var(--accent-cyan); }
        #uptime-counter { color: #3fb950; }
    </style>
</head>

<body>

    <div id="scan-line"></div>

    <h1>infoShip Real-Time Intelligence</h1>

    <div class="dashboard-grid">
        <div class="chart-container">
            <div class="card-label">LIVE STREAM</div>
            <canvas id="liveChart"></canvas>
        </div>
        <div class="chart-container">
            <div class="card-label">AVG ANALYSIS</div>
            <canvas id="averageChart"></canvas>
        </div>
    </div>

    <div class="telemetry-row">
        <div class="telemetry-box" id="box-raw">
            <span>Raw Stream Size</span>
            <div id="raw-size">0</div>
        </div>
        <div class="telemetry-box" id="box-int">
            <span>Intermediate Stream</span>
            <div id="int-size">0</div>
        </div>
        <div class="telemetry-box" id="box-proc">
            <span>Processed Stream</span>
            <div id="proc-size">0</div>
        </div>
    </div>

    <div id="status-bar">
        <span><span class="dot"></span>ONLINE</span>
        <span>PKTS: <span id="packet-count">0</span></span>
        <span>UPTIME: <span id="uptime-counter">00:00:00</span></span>
        <span>STREAM: ACTIVE</span>
    </div>

    <script>
        /* ── Uptime counter ── */
        let startTime = Date.now();
        setInterval(() => {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const h = String(Math.floor(elapsed / 3600)).padStart(2, '0');
            const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
            const s = String(elapsed % 60).padStart(2, '0');
            document.getElementById('uptime-counter').textContent = `${h}:${m}:${s}`;
        }, 1000);

        let packetCount = 0;

        /* ── Glitch helper ── */
        function glitchUpdate(elId, boxId, val) {
            const el  = document.getElementById(elId);
            const box = document.getElementById(boxId);
            el.textContent = val;
            el.classList.remove('glitch');
            void el.offsetWidth; // reflow
            el.classList.add('glitch');
            box.classList.remove('pulse-box');
            void box.offsetWidth;
            box.classList.add('pulse-box');
        }

        /* ── Chart shared options ── */
        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: {
                    grid: { color: 'rgba(255,255,255,0.04)', drawBorder: false },
                    ticks: {
                        color: '#58a6ff',
                        font: { family: "'Share Tech Mono', monospace", size: 13, weight: 'bold' },
                        padding: 10
                    },
                    title: {
                        display: true, text: 'VALUE',
                        color: '#8b949e',
                        font: { size: 11, weight: 'bold', letterSpacing: 2 }
                    }
                },
                x: {
                    grid: { display: false },
                    ticks: {
                        color: '#8b949e',
                        font: { family: "'Share Tech Mono', monospace", size: 11, style: 'italic' },
                        maxRotation: 45, minRotation: 45
                    },
                    title: {
                        display: true, text: 'TIMESTAMP / PERIOD',
                        color: '#8b949e',
                        font: { size: 11, weight: 'bold' }
                    }
                }
            },
            plugins: {
                legend: {
                    display: true, position: 'top',
                    labels: {
                        color: '#e6edf3',
                        font: { family: "'Orbitron', monospace", size: 12, weight: '700' },
                        padding: 20,
                        usePointStyle: true
                    }
                }
            },
            animation: { duration: 300 }
        };

        let hueRotation = 180;

        const liveChart = new Chart(document.getElementById('liveChart'), {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Live Sensor Value',
                    data: [],
                    borderColor: `hsl(${hueRotation}, 80%, 60%)`,
                    backgroundColor: `hsla(${hueRotation}, 80%, 60%, 0.08)`,
                    pointBackgroundColor: `hsl(${hueRotation}, 80%, 60%)`,
                    pointRadius: 4,
                    pointHoverRadius: 7,
                    fill: true,
                    tension: 0.4,
                    borderWidth: 2,
                    shadowColor: `hsl(${hueRotation}, 80%, 60%)`,
                    shadowBlur: 15
                }]
            },
            options: commonOptions
        });

        const averageChart = new Chart(document.getElementById('averageChart'), {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Running Average',
                    data: [],
                    borderColor: 'hsl(340, 80%, 60%)',
                    backgroundColor: 'hsla(340, 80%, 60%, 0.07)',
                    pointBackgroundColor: 'hsl(340, 80%, 60%)',
                    pointRadius: 4,
                    pointHoverRadius: 7,
                    borderDash: [6, 4],
                    tension: 0.4,
                    borderWidth: 2,
                    fill: true
                }]
            },
            options: commonOptions
        });

        /* ── Demo mode: generate fake packets if no socket ── */
        let demoTime = 0;
        let runningSum = 0;

        function generateDemoPacket() {
            demoTime++;
            const val = 40 + Math.sin(demoTime * 0.3) * 25 + (Math.random() - 0.5) * 15;
            runningSum += val;
            const mean = runningSum / demoTime;

            const packet = {
                time_period: `T${String(demoTime).padStart(3, '0')}`,
                metric_value: parseFloat(val.toFixed(2)),
                computed_mean: parseFloat(mean.toFixed(2))
            };

            handlePacket(packet);

            const raw  = Math.floor(Math.random() * 900 + 100);
            const intr = Math.floor(raw * 0.6);
            const proc = Math.floor(intr * 0.7);
            handleTelemetry({ raw, int: intr, proc });
            console.log(raw,intr,proc);
        }

        function handlePacket(packet) {
            packetCount++;
            document.getElementById('packet-count').textContent = packetCount;

            hueRotation = (hueRotation + 10) % 360;
            liveChart.data.datasets[0].borderColor        = `hsl(${hueRotation}, 80%, 60%)`;
            liveChart.data.datasets[0].backgroundColor    = `hsla(${hueRotation}, 80%, 60%, 0.08)`;
            liveChart.data.datasets[0].pointBackgroundColor = `hsl(${hueRotation}, 80%, 60%)`;

            liveChart.data.labels.push(packet.time_period);
            liveChart.data.datasets[0].data.push(packet.metric_value);
            averageChart.data.labels.push(packet.time_period);
            averageChart.data.datasets[0].data.push(packet.computed_mean);

            if (liveChart.data.labels.length > 20) {
                liveChart.data.labels.shift();
                liveChart.data.datasets[0].data.shift();
                averageChart.data.labels.shift();
                averageChart.data.datasets[0].data.shift();
            }

            liveChart.update();
            averageChart.update();
        }

        function handleTelemetry(data) {
            glitchUpdate('raw-size',  'box-raw',  data.raw  || 0);
            glitchUpdate('int-size',  'box-int',  data.int  || 0);
            glitchUpdate('proc-size', 'box-proc', data.proc || 0);
        }

        /* ── Socket.io integration (if available) ── */
        if (typeof io !== 'undefined') {
            const socket = io();
            socket.on('packet-arrived',   handlePacket);
            socket.on('telemetry-arrived', handleTelemetry);
        } else {
            /* Fallback: demo ticker */
            setInterval(generateDemoPacket, 800);
        }
    </script>
</body>
</html>
