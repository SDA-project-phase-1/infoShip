<!DOCTYPE html>
<html>

<head>
    <title>infoShip Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
     <script src="/socket.io/socket.io.js"></script>

</head>

<body>
    <!-- <div id="scan-line"></div> -->
    <h1> Real-Time Data Statistics</h1>

    <div class="dashboard-grid" id="all-the-graphs">
        <!-- <div class="chart-container"> -->
            <!-- <div class="card-label">LIVE STREAM</div> -->
            <!-- <div class="card-label" id="first-chart-label"></div> -->
            <!-- <canvas id="liveChart"></canvas> -->

            <!-- <div class="card-label" id="second-chart-label"></div> -->
            <!-- <canvas id="averageChart"></canvas> -->
        <!-- </div> -->
    </div>

   <div class="telemetry-row">
    <div class="telemetry-box" id="box-raw">
        <span>Raw Stream Size</span>
        <div id="raw-size">0</div>
        <div class="health-bar-wrap"><div class="health-bar" id="bar-raw"></div></div>
        <div class="tele-status" id="status-raw">NOMINAL</div>
    </div>
    <div class="telemetry-box" id="box-int">
        <span>Intermediate Stream</span>
        <div id="int-size">0</div>
        <div class="health-bar-wrap"><div class="health-bar" id="bar-int"></div></div>
        <div class="tele-status" id="status-int">NOMINAL</div>
    </div>
    <div class="telemetry-box" id="box-proc">
        <span>Processed Stream</span>
        <div id="proc-size">0</div>
        <div class="health-bar-wrap"><div class="health-bar" id="bar-proc"></div></div>
        <div class="tele-status" id="status-proc">NOMINAL</div>
    </div>
</div>

    <div id="status-bar">
        <span><span class="dot"></span>ONLINE</span>
        <span>PKTS: <span id="packet-count">0</span></span>
        <span>UPTIME: <span id="uptime-counter">00:00:00</span></span>
        <span>STREAM: ACTIVE</span>
    </div>


    <script type="module" src="/js/script.js"></script>
</body>
